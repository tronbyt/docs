{% extends "base.html" %}

{% block extrahead %}
    {{ super() }}
    <link rel="icon" type="image/png" href="{{ base_url }}/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ base_url }}/icons/favicon.svg" />
    <link rel="shortcut icon" href="{{ base_url }}/icons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ base_url }}/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="{{ config.site_name }}" />
    <link rel="manifest" href="{{ base_url }}/icons/site.webmanifest" />
{% endblock %}
